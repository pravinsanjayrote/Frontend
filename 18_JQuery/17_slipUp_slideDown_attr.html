<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <title>slipUp_slideDown_attr</title>
</head>
<body>
   <ul>
        <li>Pune</li>
        <li>Pune</li>
        <li>Pune</li>
        <li>Pune</li>
        <li>Pune</li>
   </ul>

<script>
    $(document).ready(function(){
       $("li").css("color", "red").slideUp(3000).slideDown(3000);
       $("li").attr("title", "CityList");
    })
</script>
</body>
</html>
