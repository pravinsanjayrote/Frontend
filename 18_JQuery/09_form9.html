<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <title>form9</title>
   <style>
        .box {
            border: 2px solid blue;
            width: 300px;
            height: 150px;
            padding: 5px;
            background-color: powderblue;
            text-align: center;
        }

        .first {
            background-color: aqua;
        } 

        .second {
            background-color: yellow;
            color:red;
        }
    </style>
</head>

<body>
    <ol>
        <li>list1</li>
        <li>list2</li>
        <li>list3</li>
        <li>list4</li>
        <li>list5</li>
    </ol>
    <br><br>
    <button id="appenbtn">Append</button>
    <button id="prependbtn">Prepend</button>

    <script>
        
         $(document).ready(function () {
            $('#appenbtn').click(function(){
                $('ol').append("<li>List New</li>")
            });

            $('#prependbtn').click(function(){
                $('ol').prepend("<li>List New</li>")
            });
        });

        
    </script>
</body>

</html>
