<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Sizing</title>
    <style>
        table,td,th{
            border: 2px solid black;
            border-collapse: collapse;
           
        }

        table{
            width: 100%;
            height: 300px;
            text-align: center;
            background-color: skyblue;
             box-shadow: 5px 15px 5px green;
             text-shadow: 2px 5px 5px red;
        }

        td{
            vertical-align: middle;
        }
        tr:hover{
            background-color: gray;
            color: red;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>City</th>
        </tr>
        <tr>
            <td>Ramesh</td>
            <td>25</td>
            <td>Pune</td>
        </tr>
        <tr>
            <td>Suresh</td>
            <td>27</td>
            <td>Mumbai</td>
        </tr>
        <tr>
            <td>Raghav</td>
            <td>29</td>
            <td>Banglore</td>
        </tr>
        <tr>
            <td>Pratik</td>
            <td>39</td>
            <td>Indore</td>
        </tr>
    </table>
</body>
</html>
