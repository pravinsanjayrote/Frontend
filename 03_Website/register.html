<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER</title>
</head>

<body bgcolor="gray">
    <table width="100%" bgcolor="red">
        <tr>
            <th><img src="/04_images/registration.jpg" width="50" height="25"></th>
            <th><a href="home.html">
                    <font color="white">HOME</font>
                </a></th>
            <th><a href="about.html">
                    <font color="white">ABOUT US</font>
                </a></th>
            <th><a href="product.html">
                    <font color="white">PRODUCTS</font>
                </a></th>
            <th><a href="register.html">
                    <font color="white">REGISTER</font>
                </a></th>
            <th><a href="contact.html">
                    <font color="white">CONTACT US</font>
                </a></th>
        </tr>
    </table>
    <form action="" method="post">
        <table bgcolor="cyan" align="center">
            <caption>
                <h2>Registration Form</h2>
            </caption>
            <tr>
                <td>
                    <label for="fname">First Name</label>
                </td>
                <td>
                    <input type="text" name="fname" id="fname" />
                </td>
            </tr>
            <tr>
                <td>
                    <label for="lname">Last Name</label>
                </td>
                <td>
                    <input type="text" name="lname" id="lname" />
                </td>
            </tr>
            <tr>
                <td>
                    <label for="email">Email</label>
                </td>
                <td>
                    <input type="email" name="email" id="email" />
                </td>
            </tr>
            <tr>
                <td>
                    <label for="pass">Password</label>
                </td>
                <td>
                    <input type="password" name="pass" id="pass" />
                </td>
            </tr>
            <tr>
                <td><label for="gender">Gender</label></td>
                <td>
                    <input type="radio" value="Male" name="gen" id="male" />
                    <label for="male">Male</label>
                    <input type="radio" value="FeMale" name="gen" id="female" />
                    <label for="female">FeMale</label>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="skill">Skills</label>
                </td>
                <td>
                    <input type="checkbox" name="skill" id="java" value="Java" />
                    <label for="java">Java</label>
                    <input type="checkbox" name="skill" id="Python" value="Python" />
                    <label for="Python">Python</label>
                    <input type="checkbox" name="skill" id="Php" value="Php" />
                    <label for="Php">PHp</label>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="Comment">Comments</label>
                </td>
                <td>
                    <textarea name="comment" id="Comment"></textarea>
                </td>
            </tr>
            <tr>
                <td>
                    <label for="date">DOB</label>
                </td>
                <td>
                    <input type="date" name="dob" id="date" />
                </td>
            </tr>
            <tr>
                <td>
                    <label for="resume">Upload</label>
                </td>
                <td>
                    <input type="file" name="resume" id="resume" />
                </td>
            </tr>
            <tr>
                <td>
                    <label for="city">City</label>
                </td>
                <td>
                    <select name="city" id="city">
                        <option value="Pune">Pune</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Kolkata">Kolkata</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="submit" value="Register" />
                    <input type="reset" value="Cancel" />
                </td>
            </tr>
        </table>
        <br /><br />
    </form>
</body>

</html>
