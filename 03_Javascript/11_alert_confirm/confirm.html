<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm</title>
</head>
<body>
    <input type="button" value="submit" onclick="hello()">
    <script>
        function hello(){
            var c=confirm("Are you really want to perform this action?");
            alert(c);
        }
    </script>
</body>
</html>
