<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>promise3</title>
</head>
<body>
   <script>
        function promise(x,y){
            return new Promise(function(resolve,reject){
                console.log("Work in progress...Please Wait...");
                var z=x/y;
                setTimeout(()=>{
                    if(x,y){
                        resolve(`Division is:${z}`);
                    }else{
                        reject("Failed to Divide..");
                    }
                },3000)
            })
        }

        promise(10,0)
        .then((result)=>{
            console.log(result);
        })
        .catch((error)=>{
            console.log(error);  
        });
   </script> 
</body>
</html>
