<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise</title>
</head>
<body>
    <script>
        let taskDone=false;
        let promise= new Promise(function(resolve,reject){
            if(taskDone){
                console.log("successfully completed...");
                
            }else{
                console.log("Failed...");
            }
        });
        console.log(promise);
    </script>
</body>
</html>
