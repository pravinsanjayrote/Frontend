<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
</head>

<body>
    <input type="button" name="myButton" value="Click Here to See your Status" onclick="hello()">
    <div id="mydiv"></div>
    <script>
        function hello(){
            document.getElementById("mydiv").innerHTML="We are learning DOM.";
        }
    </script>
</body>

</html>
