<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM4</title>
</head>
<body>
    <h1 id="myheading">We are learning DOM</h1>
    <input type="button" onclick="hello1()" value="RED">
    <input type="button" onclick="hello2()" value="GREEN">
    <input type="button" onclick="hello3()" value="BLUE">
    <script>
        function hello1(){
            var name = document.getElementById("myheading");
            name.style.color="red"
        }
         function hello2(){
            var name = document.getElementById("myheading");
            name.style.color="green"
        }
         function hello3(){
            var name = document.getElementById("myheading");
            name.style.color="blue"
        }
    </script>
</body>
</html>
