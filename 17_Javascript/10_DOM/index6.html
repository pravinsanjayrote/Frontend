<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="myform">
        <input type="text" name="txt1" id="txt1" placeholder="Enter Your Name: ">
        <input type="button" id="mybtn" value="submit" onclick="hello()">
    </div>
    <br><br>
    <div class="container">
        <p id="output"></p>
    </div>
    <script>
        const txt1=document.getElementById("txt1");
        const out1=document.getElementById("output");
        function hello(){
            out1.innerHTML=txt1.value;
        }
    </script>
</body>
</html>
