<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM3</title>
</head>
<body>
    <form>
        Enter Your Name:<input type="text" id="myName"><br>
        <input type="button" name="myButton" value="Click Me" onclick="hello()">
    </form>
    <script>
        function hello(){
           var name=document.getElementById("myName").value;
           alert("Welcome..."+name)
        }
    </script>
</body>
</html>
