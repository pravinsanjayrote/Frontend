<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Callback function</title>
</head>
<body>
    <script>
        function hello(name,callMeToo){
            document.write("Hello..."+name+"<br>");
            callMeToo();
        }

        function hello2(){
            document.write("Hello... I am a callback function...");
        }

        hello("Pravin",hello2);
    </script>
</body>
</html>
