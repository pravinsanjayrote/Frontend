<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>

<body>
  <div class="container mt-5">
    <div class="row">
        <div class="col-6 bg-light">
            <p class="h2 text-center text-primary">Registration Form</p>
            <form action="">
                <div class="mb-3">
                    <label for="fname" class="form-label fw-bold">First Name</label>
                    <input type="text" name="fname" id="fname" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="lname" class="form-label fw-bold">Last Name</label>
                    <input type="text" name="lname" id="lname" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="uname" class="form-label fw-bold">User Name</label>
                    <input type="text" name="uname" id="uname" class="form-control">
                    <span class="form-text">Must Contain Atleast One Special Char</span>
                </div>
                <div class="mb-3">
                    <label for="pass" class="form-label fw-bold">Password</label>
                    <input type="password" name="pass" id="pass" class="form-control">
                    <span class="form-text">Must Be 8-20 Character including one special char, one alphabet, one number</span>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Email</label>
                    <input type="email" name="email" id="email" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="file" class="form-label fw-bold">Upload Resume</label>
                    <input type="file" name="file" id="file" class="form-control">
                </div>
                <div class="mb-3">
                    <label for="gender" class="form-label fw-bold">Gender</label>
                    <div>
                        <input type="radio" name="gender" id="Male" class="form-check-input">
                        <label for="Male" class="form-label fw-bold">Male</label>
                    </div>
                    <div>
                        <input type="radio" name="gender" id="Female" class="form-check-input">
                        <label for="Female" class="form-label fw-bold">Female</label>
                    </div>
                </div>
                 <div>
                    <label for="skill" class="form-label fw-bold">Skills</label>
                </div>
                 <div class="mb-3">
                    <input type="checkbox" name="skill" id="Java" class="form-check-label">
                    <label for="Java" class=""form-check-label>Java</label>
                    <input type="checkbox" name="skill" id="Php" class="form-check-label">
                    <label for="Php" class=""form-check-label>Php</label>
                    <input type="checkbox" name="skill" id="Dot Net" class="form-check-label">
                    <label for="Dot Net" class=""form-check-label>.Net</label>
                    <input type="checkbox" name="skill" id="Bootstrap" class="form-check-label">
                    <label for="Bootstrap" class=""form-check-label>Bootstrap</label>
                </div>
                <div class="mb-3">
                    <label for="City" class="form-label fw-bold">City</label>
                    <select name="city" id="city" class="form-select">
                        <option value="">Select City</option>
                        <option value="Pune">Pune</option>
                        <option value="Mumbai">Mumbai</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Kolkata">Kolkata</option>
                    </select>
                </div>
                <div class="d-grid">
                   <button type="submit" class="btn btn-primary">Submit Form</button>
                </div>
                <div class="d-grid">
                   <button type="reset" class="btn btn-danger">Cancel Form</button>
                </div>
            </form>
        </div>
    </div>
  </div>
</body>

</html>
