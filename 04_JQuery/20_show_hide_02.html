<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <title>show_hide_02</title>
</head>
<body>
  <h2>Registration Form</h2>
  <Form id="myform">
    <label for="fname">First Name</label>
    <input type="text" name="fname" id="fname" placeholder="Enter First Name">
    <br><br>
    <div id="error" class="feedback err1">
        Error!! First Name Must be 5 chars
    </div>
    <div id="success" class="feedback success1">
        Success!! It looks good. go ahead
    </div>
    <button type="submit">Click To Submit</button>
  </Form>
   <script>
    $(document).ready(function(){
       $("#myform").on("submit", function(event){
        event.preventDefault();
        const fn = $("#fname").val().trim();
        if(fn.length<5){
            $('#error').show();
            $('#success').hide();
        }else{
            $('#success').show();
            $('#error').hide();
        }
       })
    })
   </script>
</body>
</html>
