<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <title>radio_button_get_set_val</title>
    <style>
        #mydiv {
            border: 3px solid red;
            background-color: rgb(26, 27, 27);
            color:rgb(18, 244, 97);
            width: 150px;
            margin:10px;
        }
    </style>
</head>

<body>
   <label for="">Skill</label>
   <input type="checkbox" name="skill" value="Java"/>Java
   <input type="checkbox" name="skill" value="PHP"/>Php
   <input type="checkbox" name="skill" value="HTML"/>Html
   <input type="checkbox" name="skill" value="CSS"/>CSS
   <button id="btn">Click</button>
   <div id="mydiv"></div>

<script>
    $(document).ready(function(){
        $("#btn").click(function(){
            let result=$('input[type="checkbox"]:checked');
            if(result.length>0){
              let finalresult=result.length+" checkbox has been checked. <br>";
              result.each(function(){
                finalresult+=$(this).val()+"<br>"
              })
              $("#mydiv").html(finalresult);
            }else{
                $("#mydiv").html("Select your skill");
            }
        })
    })
</script>
</body>
</html>
