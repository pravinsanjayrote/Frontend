<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://code.jquery.com/jquery-4.0.0.js"
        integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>
    <title>radio_button_get_set_val</title>
    <style>
        #mydiv {
            border: 3px solid red;
            background-color: rgb(26, 27, 27);
            color:rgb(18, 244, 97);
            width: 150px;
            margin:10px;
        }
    </style>
</head>

<body>
   <label for="">Gender</label>
   <input type="radio" name="gen" value="Male"/>Male
   <input type="radio" name="gen" value="FeMale"/>FeMale
   <button id="btn">Click</button>
   <div id="mydiv"></div>

<script>
    $(document).ready(function(){
        $("#btn").click(function(){
            let result=$('input[type="radio"]:checked');
            if(result.length>0){
                $("#mydiv").html("You are "+result.val());
            }else{
                $("#mydiv").html("Select your gender");
            }
        })
    })
</script>
</body>
</html>
