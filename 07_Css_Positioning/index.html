<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Positioning</title>
    <style>
        .div1{
            border: 2px solid red;
            width: 200px;
            height: 200px;
            margin: 20px;
            display: inline-block;
        }

        /* #div1{
            position: static;
            top: 110px;
            left: 1100px;
        } */

         /* #div1{
            position: relative;
            top: 30px;
            left: 40px;
        } */

         #div3{
            position: absolute;
            top: 30px;
            left: 40px;
            background-color: aquamarine;
        }
    </style>
</head>
<body>
    <div class="div1" id="div1">Div1</div>
    <div class="div1" id="div2">Div2</div>
    <div class="div1" id="div3">Div3</div>
    <div class="div1" id="div4">Div4</div>
</body>
</html>
